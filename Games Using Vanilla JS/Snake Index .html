<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="Snake Style.css">
</head>
    <body>

    <div class="mb-4 text-center">
        <h1 class="text-3xl font-bold text-green-500 mb-1">RETRO SNAKE</h1>
        <div class="text-xl">Score: <span id="score">0</span> | High Score: <span id="high-score">0</span></div>
    </div>

    <div id="game-container">
        <canvas id="snakeGame"></canvas>
        
        <div id="overlay">
            <h2 id="msg-title" class="text-4xl font-bold mb-4 text-white text-center">READY?</h2>
            <button id="start-btn" class="bg-green-600 hover:bg-green-500 text-white px-8 py-3 rounded-full font-bold text-xl transition-all">
                START GAME
            </button>
            <p class="mt-4 text-gray-400 text-sm">Use Arrow Keys or Buttons</p>
        </div>
    </div>

    <!-- Mobile Controls -->
    <div class="controls md:hidden">
        <div></div>
        <div class="control-btn" id="btn-up">▲</div>
        <div></div>
        <div class="control-btn" id="btn-left">◀</div>
        <div class="control-btn" id="btn-down">▼</div>
        <div class="control-btn" id="btn-right">▶</div>
    </div>
        <script src="Snake Script.js"></script>
    </body>
</html>
