<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludo Royal - Accurate Edition</title>
    <link rel="stylesheet" href="Ludo Style.css">
</head>
<body>

    <!-- STARTUP SCREEN -->
    <div id="setup-screen" class="overlay">
        <div class="card" id="mode-select">
            <h1>LUDO ROYAL</h1>
            <p>Select your gameplay mode</p>
            <div class="btn-grid">
                <button class="btn" onclick="Setup.setMode('AI')">👤 vs AI</button>
                <button class="btn" onclick="Setup.setMode('2')">👤 vs 👤</button>
                <button class="btn" onclick="Setup.setMode('3')">👤 x 3</button>
                <button class="btn" onclick="Setup.setMode('4')">👤 x 4</button>
            </div>
        </div>

        <div class="card" id="color-select" style="display:none;">
            <h1>CHOOSE COLOR</h1>
            <p id="picker-msg">Player 1, select your faction</p>
            <div class="color-row">
                <div class="dot red" onclick="Setup.chooseColor('red')"></div>
                <div class="dot green" onclick="Setup.chooseColor('green')"></div>
                <div class="dot yellow" onclick="Setup.chooseColor('yellow')"></div>
                <div class="dot blue" onclick="Setup.chooseColor('blue')"></div>
            </div>
        </div>
    </div>

    <!-- WIN SCREEN -->
    <div id="win-overlay" class="overlay">
        <div class="card">
            <h1 id="win-name">VICTORY!</h1>
            <p>The empire is yours.</p>
            <button class="btn" onclick="location.reload()" style="width: 100%; background: var(--border); color: white;">Restart Match</button>
        </div>
    </div>

    <div class="hud">
        <div id="turn-indicator">Ludo Royal</div>
    </div>

    <div class="board-wrapper">
        <!-- Interactive Dice -->
        <div id="dw-red" class="dice-wrap dw-red disabled" onclick="Ludo.roll()"><div class="dice-face"></div></div>
        <div id="dw-green" class="dice-wrap dw-green disabled" onclick="Ludo.roll()"><div class="dice-face"></div></div>
        <div id="dw-yellow" class="dice-wrap dw-yellow disabled" onclick="Ludo.roll()"><div class="dice-face"></div></div>
        <div id="dw-blue" class="dice-wrap dw-blue disabled" onclick="Ludo.roll()"><div class="dice-face"></div></div>

        <div class="ludo-board" id="board">
            <!-- Board structure generated via JS for accuracy -->
        </div>
    </div>
        <script src="Ludo Script.js"></script>
</html>
