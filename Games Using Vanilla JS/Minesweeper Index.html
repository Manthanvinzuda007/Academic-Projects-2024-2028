<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cartoon Educational Minesweeper</title>
    <link rel="stylesheet" href="Minesweeper Style.css">
</head>
<body>

    <!-- Game Over Flash Effect -->
    <div class="flash-overlay" id="flash"></div>
    <canvas id="effects-canvas"></canvas>

    <!-- Menu Screen -->
    <div class="screen active" id="menu-screen">
        <div class="menu-panel" id="menu-panel">
            <h1 class="menu-title">KIDS<br>MINESWEEPER</h1>
            
            <div class="btn-group">
                <button class="btn active-btn" data-diff="easy" onclick="setDifficulty('easy')">Beginner (9x9, 10 Mines)</button>
                <button class="btn" data-diff="medium" onclick="setDifficulty('medium')">Intermediate (16x16, 40 Mines)</button>
                <button class="btn" data-diff="hard" onclick="setDifficulty('hard')">Expert (24x24, 99 Mines)</button>
                <button class="btn" data-diff="custom" onclick="setDifficulty('custom')">Custom Setup</button>
            </div>

            <div class="custom-inputs" id="custom-inputs">
                <input type="number" id="c-rows" class="custom-input" placeholder="Rows" min="5" max="30" value="10">
                <input type="number" id="c-cols" class="custom-input" placeholder="Cols" min="5" max="30" value="10">
                <input type="number" id="c-mines" class="custom-input" placeholder="Mines" min="1" max="900" value="15">
            </div>

            <button class="btn start-btn" onclick="startGame()">START GAME 🚀</button>

            <div style="margin-top: 20px;">
                <button class="btn" style="padding: 10px; font-size: 1rem;" onclick="toggleTheme()">☀️ / 🌙 Toggle Theme</button>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div class="screen" id="game-screen">
        <div class="game-wrapper" id="game-wrapper">
            <div class="top-bar">
                <!-- Spacer to keep the face centered properly -->
                <div style="flex: 1; display: flex; justify-content: flex-start;">
                    <div class="lcd-text" id="mines-count" title="Mines Remaining">010</div>
                </div>
                
                <button class="face-btn anim-pop" id="face-btn" onclick="resetGame()">😎</button>
                
                <div style="flex: 1;"></div>
            </div>

            <div class="board-scroll-container">
                <div class="grid" id="board"></div>
            </div>

            <div class="controls">
                <button class="icon-btn" onclick="showMenu()" title="Back to Menu">🏠</button>
                <span class="pro-tip">TIP: Dbl-Click revealed numbers!</span>
                <button class="icon-btn" id="mute-btn" onclick="toggleMute()" title="Toggle Sound">🔊</button>
            </div>
        </div>
    </div>

    <!-- Educational Fact Modal Overlay -->
    <div id="fact-overlay" class="fact-overlay">
        <div class="fact-modal">
            <span class="fact-title">🌍 Did You Know?</span>
            <div id="fun-fact-text" class="fact-text">Octopuses have three hearts!</div>
            <button class="fact-resume-btn" onclick="resumeGameFromFact()">Wow! Resume Game 🚀</button>
        </div>
    </div>
    <script src="Minesweeper Script.js"></script>
</body>
</html>
