<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Sudoku Master</title>
    <link rel="stylesheet" href="Sudoku Style.css">
    <style>

    </style>
</head>
<body>

    <!-- =========================================
         LOBBY UI (Premium Zen Theme)
         ========================================= -->
    <div id="lobby-layer">
        <div class="lobby-bg-pattern"></div>
        
        <!-- Main Menu -->
        <div class="zen-panel" id="lobby-main">
            <div>
                <h1 class="lobby-title">SUDOKU</h1>
                <p class="lobby-subtitle">Train Your Brain</p>
            </div>
            
            <div class="form-row">
                <label>Select Difficulty</label>
                <select id="lobby-difficulty" class="zen-select">
                    <option value="easy">Easy - Relaxed</option>
                    <option value="medium" selected>Medium - Balanced</option>
                    <option value="hard">Hard - Challenging</option>
                    <option value="expert">Expert - Mastermind</option>
                </select>
            </div>

            <div class="flex-row mt-2">
                <button class="zen-btn" onclick="LobbyUI.startGame()">Play Game</button>
            </div>
        </div>
    </div>

    <!-- Floating In-Game Menu Button -->
    <button id="game-menu-btn" onclick="LobbyUI.exitToLobby()">Exit to Menu</button>


    <!-- =========================================
         ORIGINAL GAME DOM
         ========================================= -->
    <div id="original-game-wrapper" class="game-container">
        <div class="header">
            <!-- Hidden via CSS visually, but functionally synced by LobbyUI -->
            <div class="difficulty-selector" id="diffs" style="pointer-events: none; opacity: 0.5;">
                <span data-level="easy" class="active">Easy</span>
                <span data-level="medium">Medium</span>
                <span data-level="hard">Hard</span>
                <span data-level="expert">Expert</span>
            </div>
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">Mistakes</span>
                    <span id="mistakes">0/3</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Time</span>
                    <span id="timer">00:00</span>
                </div>
            </div>
        </div>

        <div class="main-layout">
            <div class="board" id="sudoku-board">
                <!-- Cells generated by JS -->
            </div>

            <div class="controls">
                <div class="action-buttons">
                    <button class="action-btn" id="undo-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h10a5 5 0 0 1 5 5v2a5 5 0 0 1-5 5H6"/><path d="M7 6 3 10l4 4"/></svg>
                        Undo
                    </button>
                    <button class="action-btn" id="erase-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21 21-4.3-4.3"/><path d="M12.2 4.2c.4-.4 1-.4 1.4 0l6.2 6.2c.4.4.4 1 0 1.4l-9.2 9.2-7 1 1-7 9.2-9.2Z"/></svg>
                        Erase
                    </button>
                    <button class="action-btn" id="notes-btn">
                        <div class="notes-badge" id="notes-status">OFF</div>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                        Notes
                    </button>
                    <button class="action-btn" id="hint-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6m-3-15a7 7 0 0 1 0 14h-1l-1 4h-2l-1-4h-1a7 7 0 0 1 0-14z"/></svg>
                        Hint
                    </button>
                </div>

                <div class="numpad">
                    <button class="num-btn" data-num="1">1</button>
                    <button class="num-btn" data-num="2">2</button>
                    <button class="num-btn" data-num="3">3</button>
                    <button class="num-btn" data-num="4">4</button>
                    <button class="num-btn" data-num="5">5</button>
                    <button class="num-btn" data-num="6">6</button>
                    <button class="num-btn" data-num="7">7</button>
                    <button class="num-btn" data-num="8">8</button>
                    <button class="num-btn" data-num="9">9</button>
                    <!-- Originally New Game btn was here, we hide it since Lobby handles it -->
                    <button class="new-game-btn" id="new-game-btn" style="display: none;">New Game</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Original Game Over Modal -->
    <div class="modal-overlay" id="game-over-modal">
        <div class="modal">
            <h2 id="modal-title">Excellent!</h2>
            <p id="modal-msg">You completed the Sudoku in 05:23.</p>
            <!-- Native reload button, hijacked safely via LobbyUI -->
            <button class="zen-btn" id="modal-play-again-btn" onclick="location.reload()">Return to Menu</button>
        </div>
    </div>
    <script src="Sudoku Script.js"></script>
</body>
</html>
