<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Crossword Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="Crossword Style.css">
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- Header Section -->
    <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div>
            <h1 class="text-5xl md:text-6xl anime-font text-white drop-shadow-[0_4px_0_rgba(255,71,87,1)]">
                ANIME CROSSWORD
            </h1>
            <p class="text-accent font-bold mt-2">CHALLENGE YOUR OTAKU KNOWLEDGE</p>
        </div>
        <div class="flex gap-4">
            <button onclick="game.generateNewPuzzle()" class="btn-anime px-6 py-3 rounded-lg font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                NEW PUZZLE
            </button>
            <button onclick="game.checkPuzzle()" class="btn-anime bg-green-600 px-6 py-3 rounded-lg font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                CHECK
            </button>
        </div>
    </header>

    <!-- Main Game Area -->
    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
        
        <!-- Left Column: Controls & Stats -->
        <div class="lg:col-span-3 order-2 lg:order-1 space-y-6">
            <div class="bg-slate-800/50 p-6 rounded-xl border border-white/10">
                <h3 class="anime-font text-2xl mb-4 text-accent">STATS</h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-400">Timer</span>
                        <span id="game-timer" class="text-xl font-mono text-white">00:00</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-400">Progress</span>
                        <span id="game-progress" class="text-xl font-bold text-primary">0%</span>
                    </div>
                    <div class="w-full bg-slate-700 h-2 rounded-full overflow-hidden">
                        <div id="progress-bar" class="bg-primary h-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-800/50 p-6 rounded-xl border border-white/10">
                <h3 class="anime-font text-2xl mb-4 text-accent">HINTS</h3>
                <div class="grid grid-cols-1 gap-2">
                    <button onclick="game.hintLetter()" class="text-sm bg-slate-700 hover:bg-slate-600 p-2 rounded text-left flex justify-between">
                        <span>Reveal Letter</span>
                        <span class="text-accent">-10 pts</span>
                    </button>
                    <button onclick="game.hintWord()" class="text-sm bg-slate-700 hover:bg-slate-600 p-2 rounded text-left flex justify-between">
                        <span>Reveal Word</span>
                        <span class="text-accent">-30 pts</span>
                    </button>
                    <button onclick="game.clearGrid()" class="text-sm bg-red-900/40 hover:bg-red-900/60 p-2 rounded text-left border border-red-500/30">
                        <span>Clear All</span>
                    </button>
                </div>
            </div>

            <div class="bg-slate-800/50 p-6 rounded-xl border border-white/10 hidden lg:block">
                <h3 class="anime-font text-xl mb-2 text-accent">LEGEND</h3>
                <ul class="text-xs text-slate-400 space-y-2">
                    <li>• Click cell to focus</li>
                    <li>• Double click to change direction</li>
                    <li>• Use Arrows to navigate</li>
                    <li>• Enter letters or use hints</li>
                </ul>
            </div>
        </div>

        <!-- Center: Crossword Grid -->
        <div class="lg:col-span-6 order-1 lg:order-2 flex flex-col items-center">
            <div id="grid-container-wrapper" class="w-full relative">
                <div id="grid-container"></div>
                
                <!-- Loading Overlay -->
                <div id="loading-overlay" class="absolute inset-0 bg-bg/80 flex flex-col items-center justify-center rounded-lg z-10 hidden">
                    <div class="spinner mb-4"></div>
                    <p class="anime-font text-xl">GENERATING JUTSU...</p>
                </div>
            </div>
        </div>

        <!-- Right Column: Clues -->
        <div class="lg:col-span-3 order-3 space-y-6">
            <!-- Across Clues -->
            <div class="bg-slate-800/50 rounded-xl border border-white/10 flex flex-col h-[300px] lg:h-[400px]">
                <div class="p-4 border-b border-white/10 bg-slate-800">
                    <h3 class="anime-font text-2xl text-primary flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 12 14 0"/><path d="m15 8 4 4-4 4"/></svg>
                        ACROSS
                    </h3>
                </div>
                <div id="clues-across" class="flex-1 overflow-y-auto p-2 text-sm"></div>
            </div>

            <!-- Down Clues -->
            <div class="bg-slate-800/50 rounded-xl border border-white/10 flex flex-col h-[300px] lg:h-[400px]">
                <div class="p-4 border-b border-white/10 bg-slate-800">
                    <h3 class="anime-font text-2xl text-blue-500 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 5 0 14"/><path d="m8 15 4 4 4-4"/></svg>
                        DOWN
                    </h3>
                </div>
                <div id="clues-down" class="flex-1 overflow-y-auto p-2 text-sm"></div>
            </div>
        </div>
    </main>

    <!-- Modal for Messages -->
    <div id="game-modal" class="modal-overlay">
        <div class="bg-slate-800 p-8 rounded-2xl border-4 border-primary max-w-md w-full mx-4 text-center transform transition-transform duration-300 scale-90">
            <h2 id="modal-title" class="anime-font text-4xl text-accent mb-4">SUCCESS!</h2>
            <p id="modal-body" class="text-lg text-slate-200 mb-8 font-light"></p>
            <button onclick="ui.closeModal()" class="btn-anime w-full py-3 rounded-xl font-bold text-xl">CONTINUE</button>
        </div>
    </div>

    <!-- Hidden Input for Mobile Support -->
    <input type="text" id="mobile-input" style="position: absolute; opacity: 0; pointer-events: none;">

    <script src="Crossword Script.js"></script>
</body>
</html>
